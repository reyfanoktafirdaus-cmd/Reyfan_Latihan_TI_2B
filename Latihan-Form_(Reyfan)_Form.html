<!DOCTYPE html>
<html>
<head>
    <title>Form Pendaftaran HIMATIK</title>
</head>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #253da9, #f4f6f9);
        }
        h2 {
            color: #000000;
        }
        h4 {
            color: #2c3249;
        }
        table {
            background-color: white;
            border-collapse: collapse;
        }
        td {
            padding: 10px;
        }
        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        input[type="submit"], input[type="reset"], input[type="button"] {
            padding: 10px 20px;
            margin: 5px;
            background-color: #334bb5;
            color: rgb(255, 255, 255);
            border: none;
            cursor: pointer;
        }
        input[type="submit"]:hover, input[type="reset"]:hover, input[type="button"]:hover {
            background-color: #1a2a6c;
        }
    </style>
    
<body>
<h2 align="center">Form Pendaftaran Calon HIMATIK</h2>
<h4  align="center">Himpunan Mahasiswa Teknik Informatika</h4>

<center>

<svg width="200" height="200">
<circle cx="90" cy="100" r="80" stroke="black" stroke-width="1" fill="white"/>
<text x="50" y="110" font-size="20" fill="black">HIMATIK</text>
</svg>
</center>

<br>

<center>
<h3>Canvas</h3>

<canvas id="myCanvas" width="800" height="250" style="border:1px solid rgb(11, 11, 11);">
</canvas>

<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");

ctx.fillStyle = "lightgreen";
ctx.fillRect(0,0,800,250);

ctx.font = "20px Arial";
ctx.fillStyle = "black";
ctx.fillText("   Organisasi kemahasiswaan jurusan TIK PNJ yang menjadi wadah pengembangan diri,",1,20);
ctx.fillText(" kreativitas, kolaborasi, dan prestasi dalam teknologi informasi Mereka aktif.",1,50);
ctx.fillText(" menyelenggarakan program kerja, pelatihan manajemen, serta inisiatif seperti ",1,80);
ctx.fillText("Gultik (Gudang Ilmu TIK) .",1,110);
</script>

</center>

<form>

<table border="1" align="center" cellpadding="8" cellspacing="0" width="700">

  <tr>
    <td>Nama</td>
    <td><input type="text" name="nama" size="40"></td>
  </tr>

  <tr>
    <td>Nim</td>
    <td><input type="text" name="nim"></td>
  </tr>

  <tr>
    <td>Tempat, Tanggal Lahir</td>
    <td>
    <input type="text" name="ttl">
    <input type="date" name="tgl_lahir">
  </td>
  </tr>

    <tr>
      <td>Jenis Kelamin</td>
      <td><input type="radio" name="jk" value="L"> Laki-laki
          <input type="radio" name="jk" value="P"> Perempuan</td>
    </tr>

    <tr>
      <td>Program Studi</td>
      <td>
    <select name="prodi">
        <option value="TI">Teknik Informatika</option>
        <option value="SI">Teknik Multimedia Jaringan</option>
        <option value="SK">Teknik Jaringan Komputer</option>
    </select>
    </td>
    </tr>

    <tr>
      <td>Semester</td>
      <td>
    <select name="semester">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
    </select>
      </td>
    </tr>

    <tr>
      <td>Devisi Di Himatik</td>
      <td>
        <input type="checkbox" name="devisi" value="Web Developer"> Web Developer
        <input type="checkbox" name="devisi" value="Mobile Developer"> Mobile Developer
        <input type="checkbox" name="devisi" value="Game Developer"> Game Developer
      </td>
    </tr>

    <tr>
      <td>Email</td>
      <td>
        <textarea rows="1" cols="" name="email"></textarea>
      </td>
    </tr>

    <tr>
      <td>No wa</td>
      <td>
        <textarea rows="1" cols="20" name="no_wa"></textarea>
      </td>
    </tr> 

    <tr>
      <td upload="foto">Upload Foto</td>
      <td>
      <input type="file" name="foto">
      </td> 
    </tr>

    <tr>
      <td>Alasan Ingin Bergabung</td>
      <td>
        <textarea rows="4" cols="50" name="alasan"></textarea>
      </td>
    </tr>

    <tr>  
      <td colspan="2" align="center">
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <input type="button" value="Batal">
      </td>
      </tr> 

       

</table>
</body>
</html>
</form>
