<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan JQuery Reyfan</title>

    <!-- JQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <Style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }

        h1 {
            color: #d13030;
        }

        .box{
            width: 250px;
            height: 120px;
            background: cornflowerblue;
            color: white;
            margin: 20px auto;
            line-height: 120px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        button{
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background: #f90606;
        }
    </Style>
  </head>
<body>
 <h1>Latihan JQuery Reyfan</h1>

 <div class="Box">
  Helo Temen-Temen
</div>

<button id="Hide">Hide</button>
<button id="Show">Show</button>    
<button id="Toggle">Toggle</button> 
<button id="FadeIn">Fade In</button>
<button id="FadeOut">Fade Out</button> 
<button id="Slide">Slide </button>
<button id="Chaining">Chaining</button>  

<script>
    $(document).ready(function(){
        $("#Hide").click(function(){
            $(".Box").hide(1000);
        });
        $("#Show").click(function(){
            $(".Box").show(1000);
        });
        $("#Toggle").click(function(){
            $(".Box").toggle(1000);
        });
        $("#FadeIn").click(function(){
            $(".Box").fadeIn(1000);
        });
        $("#FadeOut").click(function(){
            $(".Box").fadeOut(1000);
        });
        $("#Slide").click(function(){
            $(".Box").slideToggle(1000);
        });
        $("#Chaining").click(function(){
            $(".Box").slideUp(1000).slideDown(1000).fadeOut(1000).fadeIn(1000);
        });
    });
    </script>


</head>
</body>
</html>
