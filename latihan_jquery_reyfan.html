<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan JQuery Reyfan</title>

    <!-- JQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        h1{
            color: #333;
        }

        .box{
            width: 450px;
            height: 120px;
            background: cornflowerblue;
            color: white;
            margin: 20px auto;
            line-height: 120px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        button{
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background: #555;
        }
    </style>
</head>
<body>

    <h1>Latihan JQuery Hide / Show / Chaining</h1>

    <div class="box">
        
        Halo Teman-Teman, Selamat Belajar JQuery
    </div>

    <button id="hide">Hide</button>
    <button id="show">Show</button>
    <button id="toggle">Toggle</button>
    <button id="fade">Fade</button>
    <button id="slide">Slide</button>
    <button id="chain">Chaining</button>

    <script>

        // Hide
        $("#hide").click(function(){
            $(".box").hide(1000);
        });

        // Show
        $("#show").click(function(){
            $(".box").show(1000);
        });

        // Toggle
        $("#toggle").click(function(){
            $(".box").toggle(1000);
        });

        // Fade
        $("#fade").click(function(){
            $(".box").fadeToggle(1000);
        });

        // Slide
        $("#slide").click(function(){
            $(".box").slideToggle(1000);
        });

        // Chaining
        $("#chain").click(function(){
            $(".box")
                .css("background","green")
                .slideUp(1000)
                .slideDown(1000)
                .fadeOut(1000)
                .fadeIn(1000);
        });

    </script>

</body>
</html>
